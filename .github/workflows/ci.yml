name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Build with ${{ matrix.compiler }}
        run: |
          make CC=${{ matrix.compiler }}

      - name: Run tests
        run: |
          make test

      - name: Run memory leak check
        run: |
          make valgrind
          echo "Valgrind log:"
          head -50 valgrind.log

  test-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-dlfcn
            mingw-w64-x86_64-gcc

      - name: Preserve LF line endings
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - name: Build
        run: |
          make CC=gcc

      - name: Run tests
        run: |
          make test
